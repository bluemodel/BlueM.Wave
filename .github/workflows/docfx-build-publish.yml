name: DocFX Build and Publish

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  generate-docs:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Create empty TeeChart license file
        run: copy /Y nul > "source\My Project\TeeChart.licenses"
        shell: cmd
        
      - name: Build Wave
        run: dotnet build source\Wave.vbproj --arch x64 --configuration Release
        
      - name: Install DocFX
        run: dotnet tool install -g docfx
        
      - name: Build documentation using docfx
        working-directory: docs
        run: docfx docfx.json
        continue-on-error: false
        
      - name: Publish
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_site
          force_orphan: true        
